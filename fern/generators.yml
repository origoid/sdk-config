# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
api:
  specs:
    - openapi: ./openapi/openapi.json

default-group: local

groups:
  # Local: generate to ../sdks/* for inspection. No publish.
  local:
    generators:
      - name: fernapi/fern-typescript-node-sdk
        version: 0.51.7
        output:
          location: local-file-system
          path: ../sdks/node
        config:
          inlineFileProperties: false
          inlinePathParameters: false
          enableInlineTypes: false
          noSerdeLayer: false
          omitUndefined: false
          skipResponseValidation: false
          useLegacyExports: true
      - name: fernapi/fern-go-sdk
        version: 1.44.5
        output:
          location: local-file-system
          path: ../sdks/go
        config:
          module:
            path: github.com/origoid/sdk-go
          retryStatusCodes: legacy
      - name: fernapi/fern-python-sdk
        version: 4.64.1
        output:
          location: local-file-system
          path: ../sdks/python
        config:
          client_class_name: OrigoID
          package_name: origoid
          pydantic_config:
            version: v2

  # Publish: ship to npm / PyPI / GitHub. Run when ready to release.
  # Requires env vars: NPM_TOKEN, PYPI_TOKEN
  # GitHub push uses Fern's GitHub App (authorize once in Fern dashboard)
  publish:
    generators:
      - name: fernapi/fern-typescript-node-sdk
        version: 0.51.7
        # github-push only — npm publish runs in origoid/sdk-node ci.yml on tag
        # (NPM_TOKEN lives as a repo secret, NOT locally).
        output:
          location: npm
          package-name: "@origoid/sdk"
        github:
          repository: origoid/sdk-node
          mode: push
        config:
          inlineFileProperties: false
          inlinePathParameters: false
          enableInlineTypes: false
          noSerdeLayer: false
          omitUndefined: false
          skipResponseValidation: false
          useLegacyExports: true

      - name: fernapi/fern-python-sdk
        version: 4.64.1
        # github-push only — PyPI publish runs in origoid/sdk-python ci.yml on tag
        # (PYPI_USERNAME/PYPI_PASSWORD live as repo secrets, NOT locally).
        output:
          location: pypi
          package-name: origoid
        github:
          repository: origoid/sdk-python
          mode: push
        config:
          client_class_name: OrigoID
          package_name: origoid
          pydantic_config:
            version: v2

      - name: fernapi/fern-go-sdk
        version: 0.38.0
        github:
          repository: origoid/sdk-go
          mode: push
        config:
          module:
            path: github.com/origoid/sdk-go
          retryStatusCodes: legacy
